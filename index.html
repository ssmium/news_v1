<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>뉴스 포털</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="뉴스 포털" />

  <!-- 홈화면 아이콘 (Cloudinary 호스팅) -->
  <link rel="apple-touch-icon" href="https://res.cloudinary.com/dpvcmcpc2/image/upload/v1776818630/icon-512_tsfbuz.png" />
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dpvcmcpc2/image/upload/v1776818630/icon-512_tsfbuz.png" />

  <style>
    :root{
      --bg:#f5f6f7;
      --white:#ffffff;
      --text:#111111;
      --sub:#6b7280;
      --line:#e5e7eb;
      --blue:#2563eb;
      --blue-soft:#eef4ff;
      --shadow:0 2px 12px rgba(0,0,0,.06);
      --radius:18px;
      --radius-sm:12px;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
      -webkit-tap-highlight-color:transparent;
    }

    body{
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic","Segoe UI",sans-serif;
      background:#e5e7eb;
      color:var(--text);
      min-height:100vh;
    }

    /* 모바일 앱 느낌으로 데스크톱에서 중앙 정렬 */
    @media (min-width: 520px){
      .app.show{
        max-width:480px;
        margin:0 auto;
        min-height:100vh;
        background:var(--bg);
        box-shadow:0 0 40px rgba(0,0,0,.08);
      }
      .topbar{
        max-width:480px;
        margin:0 auto;
      }
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    /* 랜딩 */
    .landing{
      position:fixed;
      inset:0;
      background:linear-gradient(135deg, #2563eb 0%, #1e40af 50%, #0f172a 100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:space-between;
      padding:60px 20px 50px;
      z-index:9999;
      transition:opacity .45s ease, visibility .45s ease;
    }

    .landing.hide{
      opacity:0;
      visibility:hidden;
      pointer-events:none;
    }

    .landing-hero{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      color:#fff;
      gap:24px;
    }

    .landing-icon{
      width:110px;
      height:110px;
      border-radius:30px;
      background:rgba(255,255,255,.15);
      backdrop-filter:blur(20px);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:54px;
      box-shadow:0 20px 60px rgba(0,0,0,.25);
      border:1px solid rgba(255,255,255,.2);
    }

    .landing-title{
      font-size:34px;
      font-weight:900;
      letter-spacing:-0.04em;
      line-height:1.2;
    }

    .landing-sub{
      font-size:15px;
      opacity:.8;
      line-height:1.6;
      max-width:280px;
      font-weight:500;
    }

    .start-btn{
      width:100%;
      max-width:340px;
      border:none;
      background:#fff;
      color:#1e40af;
      border-radius:16px;
      padding:18px 20px;
      font-size:16px;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 10px 30px rgba(0,0,0,.2);
    }

    /* 앱 */
    .app{
      display:none;
      min-height:100vh;
      padding-bottom:30px;
    }

    .app.show{
      display:block;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:20;
      background:rgba(255,255,255,.96);
      backdrop-filter:blur(16px);
      border-bottom:1px solid var(--line);
      padding:16px 18px 12px;
    }

    .topbar-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:14px;
    }

    .brand{
      font-size:24px;
      font-weight:900;
      letter-spacing:-0.03em;
    }

    .subdate{
      margin-top:6px;
      font-size:12px;
      color:var(--sub);
      font-weight:600;
    }

    .refresh-btn{
      border:none;
      background:var(--blue-soft);
      color:var(--blue);
      border-radius:999px;
      padding:10px 12px;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
      white-space:nowrap;
    }

    .chips{
      display:flex;
      gap:8px;
      overflow-x:auto;
      padding-bottom:2px;
      scrollbar-width:none;
    }

    .chips::-webkit-scrollbar{
      display:none;
    }

    .chip{
      flex:0 0 auto;
      border:none;
      border-radius:999px;
      padding:10px 14px;
      background:#f3f4f6;
      color:#4b5563;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
    }

    .chip.active{
      background:#111827;
      color:#fff;
    }

    .container{
      padding:18px;
    }

    .section-title{
      font-size:15px;
      font-weight:900;
      margin-bottom:12px;
      letter-spacing:-0.02em;
    }

    .hero-card{
      background:var(--white);
      border-radius:24px;
      box-shadow:var(--shadow);
      overflow:hidden;
      margin-bottom:18px;
      display:block;
      border-left:4px solid var(--blue);
    }

    .hero-body{
      padding:18px;
    }

    .hero-badge{
      display:inline-block;
      margin-bottom:10px;
      padding:6px 10px;
      border-radius:999px;
      background:#eff6ff;
      color:#2563eb;
      font-size:11px;
      font-weight:900;
    }

    .hero-title{
      font-size:21px;
      line-height:1.42;
      font-weight:900;
      letter-spacing:-0.03em;
      margin-bottom:10px;
    }

    .hero-meta{
      font-size:12px;
      color:var(--sub);
      font-weight:600;
    }

    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .news-card{
      background:var(--white);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:15px 16px;
      display:flex;
      gap:12px;
      align-items:flex-start;
      cursor:pointer;
    }

    .news-rank{
      width:24px;
      flex:0 0 24px;
      text-align:center;
      font-size:15px;
      line-height:1.5;
      font-weight:900;
      color:#9ca3af;
      padding-top:1px;
    }

    .news-main{
      min-width:0;
      flex:1;
    }

    .news-title{
      font-size:15px;
      line-height:1.5;
      font-weight:800;
      letter-spacing:-0.02em;
      word-break:keep-all;
    }

    .news-meta{
      margin-top:6px;
      font-size:12px;
      color:var(--sub);
      font-weight:600;
    }

    .read-mark{
      color:#2563eb;
      font-weight:900;
      margin-right:6px;
    }

    .empty{
      background:var(--white);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:34px 20px;
      text-align:center;
      font-size:14px;
      color:var(--sub);
      line-height:1.6;
    }

    .footer-tools{
      margin-top:16px;
      display:flex;
      gap:10px;
    }

    .tool-btn{
      flex:1;
      border:none;
      background:#fff;
      border-radius:14px;
      box-shadow:var(--shadow);
      padding:13px 14px;
      font-size:13px;
      font-weight:800;
      cursor:pointer;
      color:#374151;
    }
  </style>
</head>
<body>

  <div class="landing" id="landing">
    <div class="landing-hero">
      <div class="landing-icon">📰</div>
      <div>
        <div class="landing-title">뉴스 포털</div>
        <div class="landing-sub" style="margin-top:12px;">
          오늘의 주요 뉴스를<br>한눈에 확인해보세요
        </div>
      </div>
    </div>
    <button class="start-btn" onclick="startApp()">시작하기</button>
  </div>

  <div class="app" id="app">
    <div class="topbar">
      <div class="topbar-row">
        <div>
          <div class="brand">뉴스 포털</div>
          <div class="subdate" id="todayText"></div>
        </div>
        <button class="refresh-btn" onclick="loadNews()">새로고침</button>
      </div>

      <div class="chips" id="chips">
        <button class="chip active" data-keyword="TOP" onclick="selectCategory(this)">종합</button>
        <button class="chip" data-keyword="SEARCH:정치" onclick="selectCategory(this)">정치</button>
        <button class="chip" data-keyword="BUSINESS" onclick="selectCategory(this)">경제</button>
        <button class="chip" data-keyword="SEARCH:사회" onclick="selectCategory(this)">사회</button>
        <button class="chip" data-keyword="ENTERTAINMENT" onclick="selectCategory(this)">연예</button>
        <button class="chip" data-keyword="SPORTS" onclick="selectCategory(this)">스포츠</button>
        <button class="chip" data-keyword="TECHNOLOGY" onclick="selectCategory(this)">IT</button>
      </div>
    </div>

    <div class="container">
      <div class="section-title">헤드라인</div>
      <div id="heroArea"></div>

      <div class="section-title">주요 뉴스</div>
      <div class="list" id="newsList"></div>

      <div class="footer-tools">
        <button class="tool-btn" onclick="clearRead()">읽은 기사 초기화</button>
        <button class="tool-btn" onclick="loadNews()">기사 다시 불러오기</button>
      </div>
    </div>
  </div>

  <script>
    let currentKeyword = 'TOP';
    let allNews = [];
    let readLinks = JSON.parse(localStorage.getItem('portal_read_links') || '[]');
    let requestId = 0;  // 요청 ID - 최신 요청만 반영
    const cache = new Map();  // 카테고리별 메모리 캐시
    const CACHE_TTL = 3 * 60 * 1000;  // 3분

    function startApp(){
      document.getElementById('landing').classList.add('hide');
      document.getElementById('app').classList.add('show');
      loadNews();
    }

    function setTodayText(){
      const now = new Date();
      document.getElementById('todayText').textContent =
        now.toLocaleDateString('ko-KR', {
          year:'numeric',
          month:'long',
          day:'numeric',
          weekday:'short'
        });
    }

    function selectCategory(btn){
      document.querySelectorAll('.chip').forEach(chip => chip.classList.remove('active'));
      btn.classList.add('active');
      currentKeyword = btn.dataset.keyword || 'TOP';
      loadNews();
    }

    function buildRssUrl(categoryCode){
      if (categoryCode === 'TOP') {
        return `https://news.google.com/rss?hl=ko&gl=KR&ceid=KR:ko`;
      } else if (categoryCode.startsWith('SEARCH:')) {
        const q = categoryCode.replace('SEARCH:', '');
        return `https://news.google.com/rss/search?q=${encodeURIComponent(q)}&hl=ko&gl=KR&ceid=KR:ko`;
      } else {
        return `https://news.google.com/rss/headlines/section/topic/${categoryCode}?hl=ko&gl=KR&ceid=KR:ko`;
      }
    }

    // 여러 프록시를 순차 시도
    const PROXIES = [
      (url) => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
      (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
      (url) => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`
    ];

    // 3개 프록시를 동시에 쏴서 가장 빠른 응답을 사용
    async function fetchRssText(rssUrl){
      const attempts = PROXIES.map(async (proxyFn) => {
        const proxyUrl = proxyFn(rssUrl);
        const res = await fetch(proxyUrl);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const text = await res.text();
        if (!text || !text.includes('<item')) throw new Error('빈 응답');
        console.log('[뉴스포털] 최초 성공 프록시:', proxyUrl.slice(0, 50) + '…');
        return text;
      });

      try {
        return await Promise.any(attempts);
      } catch(err) {
        throw new Error('모든 프록시 실패');
      }
    }

    function parseRss(xmlText){
      const parser = new DOMParser();
      const doc = parser.parseFromString(xmlText, 'text/xml');
      const items = Array.from(doc.querySelectorAll('item')).slice(0, 30);
      return items.map(item => ({
        title: item.querySelector('title')?.textContent?.trim() || '제목 없음',
        link: item.querySelector('link')?.textContent?.trim() || '',
        pubDate: item.querySelector('pubDate')?.textContent?.trim() || ''
      }));
    }

    function isKoreanTitle(title){
      return /[가-힣]/.test(title || '');
    }

    function formatTime(dateStr){
      try{
        return new Date(dateStr).toLocaleString('ko-KR');
      }catch{
        return '';
      }
    }

    function escapeHtml(str){
      return String(str || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function saveRead(){
      localStorage.setItem('portal_read_links', JSON.stringify(readLinks));
    }

    function clearRead(){
      readLinks = [];
      saveRead();
      renderNews();
    }

    function openNews(link){
      if (!readLinks.includes(link)) {
        readLinks.push(link);
        saveRead();
      }
      window.location.href = link;
    }

    function renderNews(){
      const heroArea = document.getElementById('heroArea');
      const newsList = document.getElementById('newsList');

      const filtered = allNews.filter(item => !readLinks.includes(item.link));

      if (!filtered.length){
        heroArea.innerHTML = '';
        newsList.innerHTML = `
          <div class="empty">
            지금 볼 수 있는 한국어 기사가 없어요.<br>
            카테고리를 바꾸거나 읽은 기사 초기화를 눌러보세요.
          </div>
        `;
        return;
      }

      const hero = filtered[0];
      const rest = filtered.slice(1, 11);

      heroArea.innerHTML = `
        <a href="${escapeHtml(hero.link)}" class="hero-card" onclick="markReadOnly('${escapeHtml(hero.link)}')">
          <div class="hero-body">
            <div class="hero-badge">오늘의 헤드라인</div>
            <div class="hero-title">${escapeHtml(hero.title)}</div>
            <div class="hero-meta">${formatTime(hero.pubDate)}</div>
          </div>
        </a>
      `;

      newsList.innerHTML = rest.map((item, idx) => `
        <div class="news-card" onclick="openNews('${escapeHtml(item.link)}')">
          <div class="news-rank">${idx + 1}</div>
          <div class="news-main">
            <div class="news-title">
              ${readLinks.includes(item.link) ? '<span class="read-mark">읽음</span>' : ''}
              ${escapeHtml(item.title)}
            </div>
            <div class="news-meta">${formatTime(item.pubDate)}</div>
          </div>
        </div>
      `).join('');
    }

    function markReadOnly(link){
      if (!readLinks.includes(link)) {
        readLinks.push(link);
        saveRead();
      }
    }

    async function loadNews(){
      const heroArea = document.getElementById('heroArea');
      const newsList = document.getElementById('newsList');

      // 이 요청만의 고유 ID 생성
      const myRequestId = ++requestId;
      const myKeyword = currentKeyword;

      // 캐시 확인 - 있으면 즉시 표시
      const cached = cache.get(myKeyword);
      if (cached && (Date.now() - cached.time < CACHE_TTL)) {
        console.log('[뉴스포털] 캐시 사용:', myKeyword);
        allNews = cached.data;
        renderNews();
        return;
      }

      heroArea.innerHTML = `
        <div class="hero-card">
          <div class="hero-body">
            <div class="hero-badge">불러오는 중</div>
            <div class="hero-title">뉴스를 가져오고 있어요</div>
            <div class="hero-meta">잠시만 기다려주세요</div>
          </div>
        </div>
      `;
      newsList.innerHTML = '';

      try{
        const rssUrl = buildRssUrl(myKeyword);
        console.log('[뉴스포털] RSS URL:', rssUrl, '(id:', myRequestId, ')');

        const xmlText = await fetchRssText(rssUrl);

        // 내가 요청한 사이에 더 최신 요청이 있었으면 버림
        if (myRequestId !== requestId) {
          console.log('[뉴스포털] 오래된 응답 버림 (id:', myRequestId, '→ 최신:', requestId, ')');
          return;
        }

        const items = parseRss(xmlText);
        console.log('[뉴스포털] 파싱된 기사 수:', items.length);

        const filtered = items.filter(item => item.link && isKoreanTitle(item.title));
        console.log('[뉴스포털] 한국어 필터 후:', filtered.length);

        // 캐시에 저장
        cache.set(myKeyword, { data: filtered, time: Date.now() });

        allNews = filtered;

        if (allNews.length === 0) {
          heroArea.innerHTML = '';
          newsList.innerHTML = `<div class="empty">한국어 기사를 찾지 못했어요.<br>다른 카테고리를 눌러보세요.</div>`;
          return;
        }

        renderNews();
      }catch(e){
        // 오래된 요청의 에러는 무시
        if (myRequestId !== requestId) return;

        console.error('[뉴스포털] 오류:', e);
        heroArea.innerHTML = '';
        newsList.innerHTML = `
          <div class="empty">
            네트워크 오류가 발생했어요.<br>
            잠시 후 다시 시도해주세요.<br>
            <small style="color:#9ca3af;">(${escapeHtml(e.message || '알 수 없는 오류')})</small>
          </div>
        `;
      }
    }

    // 랜딩 화면 있는 동안 TOP 뉴스를 미리 로딩 (백그라운드)
    async function preloadTop(){
      try {
        const xmlText = await fetchRssText(buildRssUrl('TOP'));
        const items = parseRss(xmlText);
        const filtered = items.filter(item => item.link && isKoreanTitle(item.title));
        cache.set('TOP', { data: filtered, time: Date.now() });
        console.log('[뉴스포털] TOP 사전 로딩 완료:', filtered.length);
      } catch(e) {
        // 실패해도 조용히 넘김 (실제 클릭 시 다시 시도됨)
      }
    }

    setTodayText();
    preloadTop();  // 랜딩 화면 있는 동안 미리 로딩

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
